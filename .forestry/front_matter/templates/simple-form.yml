---
label: Simple Form
hide_body: true
fields:
- name: block
  type: text
  config:
    required: false
  label: block
  default: simple-form
  hidden: true
- name: title
  type: text
  config:
    required: false
  label: title
- name: form
  type: field_group
  config: {}
  fields:
  - name: type
    type: text
    config:
      required: false
    label: type
    default: simple
    hidden: true
  - name: recipient
    type: text
    config:
      required: false
    label: recipient
  - name: submit_text
    type: text
    config:
      required: false
    label: submit_text
  - name: action
    type: text
    config:
      required: false
    label: action
    hidden: true
  - name: method
    type: select
    default: []
    config:
      required: false
      options:
      - POST
      - GET
      source:
        type: simple
        section: 
        file: 
        path: 
    label: method
    hidden: true
  - name: fields
    type: include
    config: {}
    template: form-fields
    label: fields
  label: form
