---
label: post-item
hide_body: false
fields:
- name: thumbnail
  type: file
  config:
    maxSize: 64
  label: Thumbnail
- name: title
  type: text
  config:
    required: true
  label: Title
- name: content
  type: textarea
  default: ''
  config:
    required: true
    wysiwyg: true
    schema:
      format: html-blocks
  label: Content
