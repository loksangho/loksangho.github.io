<section id="list-of-portfolio-items" class="block block-list-of-portfolio-items">
    
    <ul class="portfolio_list">
        {% for post in site.posts %}
            <li>
            <div class="thumbnail">
                <a href="{{post.path}}">
              <img style="width:{{section.thumbnail_width}}; height:{{section.thumbnail_height}}; overflow: hidden" src="{{ post.thumbnail}}" />
                    </a>
            </div>
          </li>
        {% endfor %}
          
        </ul>
</section>
