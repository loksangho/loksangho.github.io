<header class="block block-header-2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <div class="block-header-2--logo">
    <a href="{{ site.url | relative_url }}">
      <img src="{{ section.logo | relative_url }}" alt="{{ site.title }}">
    </a>
  </div>

  <nav class="block-header-2--nav" id="myTopnav">
    <!--<ul>-->
        {% for nav_item in section.navigation %}
        <!--<li class="nav-item {% if page.url == nav_item.link %}active{% endif %}">-->
    <a class="nav-item {% if page.url == nav_item.link %}active{% endif %}" href="{{ nav_item.link }}">{{ nav_item.link_text }}</a>
    <!--</li>-->
        {% endfor %}
    <!--</ul>-->
    <a class="button primary small block-header-2--cta" href="{{ section.cta.url }}">{{ section.cta.button_text }}</a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
      <i class="fa fa-bars"></i>
    </a>
  </nav>
</header>
<script>

  function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "block-header-2--nav") {
    x.className += " responsive";
  } else {
    x.className = "block-header-2--nav";
  }
}
</script>
